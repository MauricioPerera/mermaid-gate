diagram_type: flowchart

min_nodes: 3
max_nodes: 10

required_nodes:
  - id: A
    label: Inicio
  - id: B
  - id: C

required_edges:
  - from: A
    to: B
  - from: B
    to: C
    label: Si

semantic_checks:
  - "el diagrama maneja explicitamente un camino de error o rechazo, no solo el camino feliz"
  - "los nombres de los nodos son descriptivos, no genericos como 'Paso 1'"
